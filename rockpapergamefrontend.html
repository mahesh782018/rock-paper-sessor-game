<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors Pro</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        .btn {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .rock { background: #ff6b6b; }
        .paper { background: #1dd1a1; }
        .scissor { background: #feca57; }

        #result {
            font-size: 26px;
            margin-top: 20px;
            animation: fade 0.5s ease-in-out;
        }

        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .scoreboard {
            margin-top: 20px;
            font-size: 20px;
        }

        .mode {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h1>🎮 Rock Paper Scissors</h1>

<div class="mode">
    <button onclick="setMode('single')">Single Player</button>
    <button onclick="setMode('multi')">2 Player</button>
</div>

<br>

<button class="btn rock" onclick="play(1)">✊ Rock</button>
<button class="btn paper" onclick="play(2)">✋ Paper</button>
<button class="btn scissor" onclick="play(3)">✌️ Scissor</button>

<h2 id="turn"></h2>
<h2 id="choice"></h2>
<h2 id="result"></h2>

<div class="scoreboard">
    🧑 Player 1: <span id="p1">0</span> |
    🧑 Player 2 / 🤖 Machine: <span id="p2">0</span>
</div>

<!-- Sound Effects -->
<audio id="winSound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>
<audio id="loseSound" src="https://www.fesliyanstudios.com/play-mp3/438"></audio>

<script>
    let mode = "single";
    let p1Score = 0;
    let p2Score = 0;

    let playerTurn = 1;
    let p1Choice = null;

    function setMode(selected) {
        mode = selected;
        resetGame();
        alert("Mode: " + (mode === "single" ? "Single Player" : "2 Player"));
    }

    function play(user) {
        let choices = ["Rock", "Paper", "Scissor"];

        // SINGLE PLAYER MODE
        if (mode === "single") {
            let machine = Math.floor(Math.random() * 3) + 1;

            document.getElementById("choice").innerHTML =
                "🤖 Machine chose: " + choices[machine - 1];

            decideWinner(user, machine);
        }

        // MULTI PLAYER MODE
        else {
            if (playerTurn === 1) {
                p1Choice = user;
                playerTurn = 2;
                document.getElementById("turn").innerHTML = "Player 2 Turn";
            } else {
                document.getElementById("choice").innerHTML =
                    "P1: " + choices[p1Choice - 1] +
                    " | P2: " + choices[user - 1];

                decideWinner(p1Choice, user);
                playerTurn = 1;
                document.getElementById("turn").innerHTML = "Player 1 Turn";
            }
        }
    }

    function decideWinner(p1, p2) {
        let resultText = "";

        if (p1 === p2) {
            resultText = "🤝 It's a Tie!";
        } else if (
            (p1 === 1 && p2 === 3) ||
            (p1 === 2 && p2 === 1) ||
            (p1 === 3 && p2 === 2)
        ) {
            resultText = "🎉 Player 1 Wins!";
            p1Score++;
            document.getElementById("winSound").play();
        } else {
            resultText = (mode === "single") ? "😢 You Lost!" : "🎉 Player 2 Wins!";
            p2Score++;
            document.getElementById("loseSound").play();
        }

        document.getElementById("result").innerHTML = resultText;

        document.getElementById("p1").innerText = p1Score;
        document.getElementById("p2").innerText = p2Score;
    }

    function resetGame() {
        p1Score = 0;
        p2Score = 0;
        playerTurn = 1;
        document.getElementById("p1").innerText = 0;
        document.getElementById("p2").innerText = 0;
        document.getElementById("result").innerHTML = "";
        document.getElementById("choice").innerHTML = "";
        document.getElementById("turn").innerHTML = "";
    }
</script>

</body>
</html>
